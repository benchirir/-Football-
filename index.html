<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ eFootball Style | Realistic 3D Soccer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #000;
            touch-action: none;
        }
        /* HUD - broadcast style */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }
        .scoreboard {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 30px;
            display: flex;
            gap: 40px;
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .team {
            text-align: center;
            color: white;
            font-weight: bold;
        }
        .team-name {
            font-size: 14px;
            letter-spacing: 1px;
        }
        .score {
            font-size: 32px;
            font-family: monospace;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .vs {
            color: white;
            font-size: 18px;
            margin-top: 8px;
        }
        /* Action Buttons (like console) */
        .action-panel {
            position: absolute;
            bottom: 25px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #2c2c3a, #1a1a2a);
            box-shadow: 0 6px 0 #0a0a15;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a0a15;
        }
        .shoot { background: radial-gradient(circle at 30% 30%, #e63946, #9b111e); }
        .pass { background: radial-gradient(circle at 30% 30%, #2ecc71, #1a6b3a); }
        .sprint {
            position: absolute;
            bottom: 25px;
            left: 20px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #d4a017);
            color: #1a1a2a;
        }
        @media (max-width: 700px) {
            .btn { width: 55px; height: 55px; font-size: 12px; }
            .score { font-size: 24px; }
        }
        /* Goal flash effect */
        @keyframes flash {
            0% { background: rgba(255,215,0,0); }
            50% { background: rgba(255,215,0,0.6); }
            100% { background: rgba(255,215,0,0); }
        }
        .goal-flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            animation: flash 0.6s ease-out;
            z-index: 15;
        }
        #possession {
            position: absolute;
            bottom: 20px;
            left: 100px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 30px;
            color: #ccc;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="scoreboard">
            <div class="team">
                <div class="team-name" style="color:#3a86ff;">MADRID</div>
                <div class="score" id="scoreHome">0</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <div class="team-name" style="color:#e63946;">BARÇA</div>
                <div class="score" id="scoreAway">0</div>
            </div>
        </div>
    </div>
    <div id="possession">⚽ POSSESSION: HOME</div>
    <div class="action-panel">
        <button class="btn pass" id="passBtn">PASS</button>
        <button class="btn shoot" id="shootBtn">SHOOT</button>
    </div>
    <button class="btn sprint" id="sprintBtn">SPRINT</button>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a0e);
        scene.fog = new THREE.FogExp2(0x071a0e, 0.004);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 6.8, 14.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Lighting (stadium quality) ---
        const ambient = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
        mainLight.position.set(5, 12, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 25;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(0, 4, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-3, 5, -6);
        scene.add(backLight);
        // floodlights
        for (let i = -1; i <= 1; i++) {
            const light = new THREE.PointLight(0xffcc88, 0.8, 25);
            light.position.set(i * 7, 6, 13);
            scene.add(light);
        }
        
        // --- Pitch (realistic grass) ---
        const fieldW = 16, fieldL = 28;
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2a8a3a, roughness: 0.7, metalness: 0.05 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(fieldL, fieldW), grassMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grass blades
        const bladeGeom = new THREE.CylinderGeometry(0.04, 0.07, 0.12, 4);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0x44bb54 });
        for (let i = 0; i < 2000; i++) {
            const blade = new THREE.Mesh(bladeGeom, bladeMat);
            blade.position.x = (Math.random() - 0.5) * (fieldL - 1);
            blade.position.z = (Math.random() - 0.5) * (fieldW - 1);
            blade.position.y = -0.04;
            blade.castShadow = false;
            scene.add(blade);
        }
        
        // Pitch markings
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const lineBox = (x1, z1, x2, z2, thick=0.08) => {
            const dx = x2 - x1, dz = z2 - z1;
            const len = Math.hypot(dx, dz);
            const box = new THREE.Mesh(new THREE.BoxGeometry(thick, 0.05, len), lineMat);
            box.position.set((x1+x2)/2, 0.02, (z1+z2)/2);
            box.rotation.y = Math.atan2(dz, dx);
            scene.add(box);
        };
        lineBox(0, -fieldW/2, 0, fieldW/2);
        // center circle
        const circlePoints = [];
        const r = 3.0;
        for (let i = 0; i <= 64; i++) {
            const a = (i/64)*Math.PI*2;
            circlePoints.push(new THREE.Vector3(Math.cos(a)*r, 0.02, Math.sin(a)*r));
        }
        const circleLine = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(circlePoints), new THREE.LineBasicMaterial({ color: 0xffffff }));
        scene.add(circleLine);
        // penalty areas
        const penDepth = 4.0, penWidth = 5.2;
        const leftPen = [[-fieldL/2, -penWidth/2], [-fieldL/2+penDepth, -penWidth/2], [-fieldL/2+penDepth, penWidth/2], [-fieldL/2, penWidth/2]];
        for (let i=0; i<leftPen.length; i++) {
            const p1 = leftPen[i], p2 = leftPen[(i+1)%leftPen.length];
            lineBox(p1[0], p1[1], p2[0], p2[1]);
        }
        const rightPen = [[fieldL/2, -penWidth/2], [fieldL/2-penDepth, -penWidth/2], [fieldL/2-penDepth, penWidth/2], [fieldL/2, penWidth/2]];
        for (let i=0; i<rightPen.length; i++) {
            const p1 = rightPen[i], p2 = rightPen[(i+1)%rightPen.length];
            lineBox(p1[0], p1[1], p2[0], p2[1]);
        }
        // center spot
        const centerSpot = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        centerSpot.position.set(0, 0.02, 0);
        scene.add(centerSpot);
        
        // Goals (3D)
        const goalMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
        const postGeom = new THREE.BoxGeometry(0.12, 2.2, 0.12);
        const crossGeom = new THREE.BoxGeometry(2.8, 0.12, 0.12);
        // left goal
        const leftGoal = new THREE.Group();
        const lpL = new THREE.Mesh(postGeom, goalMat); lpL.position.set(-fieldL/2-0.08, 1.0, -0.9);
        const lpR = new THREE.Mesh(postGeom, goalMat); lpR.position.set(-fieldL/2-0.08, 1.0, 0.9);
        const lCross = new THREE.Mesh(crossGeom, goalMat); lCross.position.set(-fieldL/2-0.08, 2.05, 0);
        leftGoal.add(lpL, lpR, lCross);
        scene.add(leftGoal);
        // right goal
        const rightGoal = new THREE.Group();
        const rpL = new THREE.Mesh(postGeom, goalMat); rpL.position.set(fieldL/2+0.08, 1.0, -0.9);
        const rpR = new THREE.Mesh(postGeom, goalMat); rpR.position.set(fieldL/2+0.08, 1.0, 0.9);
        const rCross = new THREE.Mesh(crossGeom, goalMat); rCross.position.set(fieldL/2+0.08, 2.05, 0);
        rightGoal.add(rpL, rpR, rCross);
        scene.add(rightGoal);
        // nets
        const netMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.4 });
        for (let i=-1; i<=1; i++) {
            const netLeft = new THREE.Mesh(new THREE.BoxGeometry(0.05, 2.0, 2.2), netMat);
            netLeft.position.set(-fieldL/2-0.45, 1.0, i*1.1);
            scene.add(netLeft);
            const netRight = new THREE.Mesh(new THREE.BoxGeometry(0.05, 2.0, 2.2), netMat);
            netRight.position.set(fieldL/2+0.45, 1.0, i*1.1);
            scene.add(netRight);
        }
        
        // --- Stadium (immersive, huge) ---
        const standMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.7 });
        for (let side = -1; side <= 1; side+=2) {
            for (let row = 0; row < 8; row++) {
                const tier = new THREE.BoxGeometry(fieldL+2.5+row*0.4, 0.35, 2.2);
                const stand = new THREE.Mesh(tier, standMat);
                stand.position.set(0, -0.2+row*0.38, side*(fieldW/2+1.4+row*0.2));
                stand.castShadow = true;
                scene.add(stand);
            }
        }
        // end stands
        for (let end = -1; end <= 1; end+=2) {
            for (let row = 0; row < 7; row++) {
                const tier = new THREE.BoxGeometry(2.8, 0.35, fieldW+1.5);
                const stand = new THREE.Mesh(tier, standMat);
                stand.position.set(end*(fieldL/2+1.7+row*0.25), -0.2+row*0.38, 0);
                stand.castShadow = true;
                scene.add(stand);
            }
        }
        // crowd
        const crowdColors = [0xe63946, 0x3a86ff, 0xffd700, 0x2ecc71, 0x9b59b6];
        for (let i = 0; i < 1500; i++) {
            const person = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.5, 0.28), new THREE.MeshStandardMaterial({ color: crowdColors[Math.floor(Math.random()*crowdColors.length)] }));
            let ang = Math.random()*Math.PI*2;
            let rad = fieldL/2 + 1.8 + Math.random()*2.2;
            person.position.x = Math.cos(ang)*rad;
            person.position.z = Math.sin(ang)*rad*0.9;
            person.position.y = -0.25;
            scene.add(person);
        }
        
        // --- Ball (detailed sphere) ---
        const ballGeom = new THREE.SphereGeometry(0.34, 128, 128);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.05 });
        const ball = new THREE.Mesh(ballGeom, ballMat);
        ball.castShadow = true;
        ball.receiveShadow = true;
        scene.add(ball);
        // seams
        const seamMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        for (let i = 0; i < 6; i++) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.035, 64, 100), seamMat);
            ring.rotation.x = Math.PI/2;
            ring.rotation.z = (i/6)*Math.PI*2;
            ring.position.y = 0.01;
            ball.add(ring);
        }
        
        // --- Player Model (realistic, detailed) ---
        function createPlayer(color, number, x, z, teamSide) {
            const group = new THREE.Group();
            // Body
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.4, 0.95, 12), new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 }));
            body.castShadow = true;
            body.position.y = 0.48;
            group.add(body);
            // Shorts
            const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.42, 0.38, 8), new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 }));
            shorts.position.y = 0.16;
            shorts.castShadow = true;
            group.add(shorts);
            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), new THREE.MeshStandardMaterial({ color: 0xf5c9a0, roughness: 0.2 }));
            head.position.y = 0.98;
            head.castShadow = true;
            group.add(head);
            // Hair
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.34, 24, 24), new THREE.MeshStandardMaterial({ color: teamSide === 'home' ? 0x2a1a0a : 0x1a0a00 }));
            hair.position.y = 1.08;
            hair.scale.set(1, 0.35, 1);
            group.add(hair);
            // Eyes
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.085, 24, 24), eyeMat);
            leftEye.position.set(-0.12, 1.04, 0.32);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.085, 24, 24), eyeMat);
            rightEye.position.set(0.12, 1.04, 0.32);
            group.add(rightEye);
            // Eyebrows
            const browMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a });
            const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.06, 0.06), browMat);
            leftBrow.position.set(-0.13, 1.09, 0.33);
            group.add(leftBrow);
            const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.06, 0.06), browMat);
            rightBrow.position.set(0.13, 1.09, 0.33);
            group.add(rightBrow);
            // Arms
            const armMat = new THREE.MeshStandardMaterial({ color: color });
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.6, 6), armMat);
            leftArm.position.set(-0.48, 0.75, 0);
            leftArm.rotation.z = 0.3;
            group.add(leftArm);
            const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.6, 6), armMat);
            rightArm.position.set(0.48, 0.75, 0);
            rightArm.rotation.z = -0.3;
            group.add(rightArm);
            // Legs
            const legMat = new THREE.MeshStandardMaterial({ color: color });
            const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.55, 6), legMat);
            leftLeg.position.set(-0.22, 0.1, 0);
            group.add(leftLeg);
            const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.55, 6), legMat);
            rightLeg.position.set(0.22, 0.1, 0);
            group.add(rightLeg);
            // Jersey number
            const div = document.createElement('div');
            div.textContent = number;
            div.style.color = 'white';
            div.style.fontSize = '15px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0 black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 7px';
            div.style.borderRadius = '30px';
            div.style.border = `1px solid ${color === 0x3a86ff ? '#3a86ff' : '#e63946'}`;
            const label = new CSS2DObject(div);
            label.position.set(0, 1.18, 0);
            group.add(label);
            
            group.position.set(x, 0, z);
            group.userData = { team: teamSide, number, speed: 2.2, origX: x, origZ: z };
            return group;
        }
        
        // --- Formations (4-4-3) ---
        const homePos = [
            { x: -fieldL/2 + 1.8, z: 0 },          // GK
            { x: -fieldL/2 + 4.8, z: -4.5 }, { x: -fieldL/2 + 4.8, z: -1.5 }, { x: -fieldL/2 + 4.8, z: 1.5 }, { x: -fieldL/2 + 4.8, z: 4.5 }, // DEF
            { x: -fieldL/2 + 9, z: -5 }, { x: -fieldL/2 + 9, z: -2 }, { x: -fieldL/2 + 9, z: 2 }, { x: -fieldL/2 + 9, z: 5 }, // MID
            { x: -fieldL/2 + 13.5, z: -3.5 }, { x: -fieldL/2 + 13.5, z: 0 }, { x: -fieldL/2 + 13.5, z: 3.5 }  // ATT
        ];
        const awayPos = [
            { x: fieldL/2 - 1.8, z: 0 },
            { x: fieldL/2 - 4.8, z: -4.5 }, { x: fieldL/2 - 4.8, z: -1.5 }, { x: fieldL/2 - 4.8, z: 1.5 }, { x: fieldL/2 - 4.8, z: 4.5 },
            { x: fieldL/2 - 9, z: -5 }, { x: fieldL/2 - 9, z: -2 }, { x: fieldL/2 - 9, z: 2 }, { x: fieldL/2 - 9, z: 5 },
            { x: fieldL/2 - 13.5, z: -3.5 }, { x: fieldL/2 - 13.5, z: 0 }, { x: fieldL/2 - 13.5, z: 3.5 }
        ];
        
        const homeTeam = [], awayTeam = [];
        for (let i=0; i<homePos.length; i++) {
            const p = createPlayer(0x3a86ff, (i+1).toString(), homePos[i].x, homePos[i].z, 'home');
            scene.add(p);
            homeTeam.push(p);
        }
        for (let i=0; i<awayPos.length; i++) {
            const p = createPlayer(0xe63946, (i+1).toString(), awayPos[i].x, awayPos[i].z, 'away');
            scene.add(p);
            awayTeam.push(p);
        }
        const allPlayers = [...homeTeam, ...awayTeam];
        
        // Controlled player (start with home midfielder)
        let controlled = allPlayers[7];
        let sprinting = false;
        let shootCooldown = 0;
        
        // Ball physics
        let ballPos = { x: 0, z: 0 };
        let ballVel = { x: 0, z: 0 };
        ball.position.set(0, 0.34, 0);
        
        let homeScore = 0, awayScore = 0;
        const scoreHomeEl = document.getElementById('scoreHome');
        const scoreAwayEl = document.getElementById('scoreAway');
        const possessionEl = document.getElementById('possession');
        
        // Touch movement
        let dragTarget = null;
        let isDragging = false;
        
        function getGroundFromScreen(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouseX = ((clientX - rect.left) / rect.width) * 2 - 1;
            const mouseY = -((clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(mouseX, mouseY), camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const point = raycaster.ray.intersectPlane(plane, new THREE.Vector3());
            if (point) return { x: point.x, z: point.z };
            return null;
        }
        
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const world = getGroundFromScreen(touch.clientX, touch.clientY);
            if (world) {
                // select player if tapped
                let selected = null;
                let minDist = 1.0;
                for (let p of allPlayers) {
                    const d = Math.hypot(p.position.x - world.x, p.position.z - world.z);
                    if (d < minDist) { minDist = d; selected = p; }
                }
                if (selected) controlled = selected;
                else { dragTarget = world; isDragging = true; }
            }
        });
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                const world = getGroundFromScreen(touch.clientX, touch.clientY);
                if (world) dragTarget = world;
            }
        });
        renderer.domElement.addEventListener('touchend', () => { isDragging = false; dragTarget = null; });
        // mouse fallback
        renderer.domElement.addEventListener('mousedown', (e) => {
            const world = getGroundFromScreen(e.clientX, e.clientY);
            if (world) {
                let selected = null;
                let minDist = 1.0;
                for (let p of allPlayers) {
                    const d = Math.hypot(p.position.x - world.x, p.position.z - world.z);
                    if (d < minDist) { minDist = d; selected = p; }
                }
                if (selected) controlled = selected;
                else { dragTarget = world; isDragging = true; }
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging && e.buttons === 1) {
                const world = getGroundFromScreen(e.clientX, e.clientY);
                if (world) dragTarget = world;
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; dragTarget = null; });
        
        // AI movement
        function updateAI() {
            for (let p of allPlayers) {
                if (p === controlled) continue;
                const dx = ballPos.x - p.position.x;
                const dz = ballPos.z - p.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist < 4.2) {
                    const move = 0.065;
                    p.position.x += (dx / dist) * move;
                    p.position.z += (dz / dist) * move;
                } else {
                    const orig = p.userData;
                    const dxr = orig.origX - p.position.x;
                    const dzr = orig.origZ - p.position.z;
                    const distr = Math.hypot(dxr, dzr);
                    if (distr > 0.1) {
                        p.position.x += (dxr / distr) * 0.05;
                        p.position.z += (dzr / distr) * 0.05;
                    }
                }
                // boundaries
                p.position.x = Math.min(Math.max(p.position.x, -fieldL/2 + 0.7), fieldL/2 - 0.7);
                p.position.z = Math.min(Math.max(p.position.z, -fieldW/2 + 0.7), fieldW/2 - 0.7);
                // ball collision
                const bdist = Math.hypot(p.position.x - ballPos.x, p.position.z - ballPos.z);
                if (bdist < 0.55 && p !== controlled) {
                    const ang = Math.atan2(ballPos.z - p.position.z, ballPos.x - p.position.x);
                    ballVel.x += Math.cos(ang) * 0.9;
                    ballVel.z += Math.sin(ang) * 0.9;
                }
            }
        }
        
        // Controlled movement
        function updateControlled() {
            if (isDragging && dragTarget) {
                const speed = sprinting ? 0.24 : 0.16;
                let dx = dragTarget.x - controlled.position.x;
                let dz = dragTarget.z - controlled.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 0.1) {
                    controlled.position.x += (dx / dist) * speed;
                    controlled.position.z += (dz / dist) * speed;
                }
            }
            controlled.position.x = Math.min(Math.max(controlled.position.x, -fieldL/2 + 0.7), fieldL/2 - 0.7);
            controlled.position.z = Math.min(Math.max(controlled.position.z, -fieldW/2 + 0.7), fieldW/2 - 0.7);
            
            const bdist = Math.hypot(controlled.position.x - ballPos.x, controlled.position.z - ballPos.z);
            if (bdist < 0.55) {
                const ang = Math.atan2(ballPos.z - controlled.position.z, ballPos.x - controlled.position.x);
                let power = sprinting ? 1.6 : 1.0;
                ballVel.x += Math.cos(ang) * power;
                ballVel.z += Math.sin(ang) * power;
            }
        }
        
        // Actions
        function shoot() {
            if (shootCooldown > 0) return;
            const ang = Math.atan2(ballPos.z - controlled.position.z, ballPos.x - controlled.position.x);
            const power = sprinting ? 3.2 : 2.2;
            ballVel.x += Math.cos(ang) * power;
            ballVel.z += Math.sin(ang) * power;
            shootCooldown = 22;
        }
        function pass() {
            if (shootCooldown > 0) return;
            let target = null;
            let minD = 100;
            for (let p of allPlayers) {
                if (p !== controlled && p.userData.team === controlled.userData.team) {
                    const d = Math.hypot(p.position.x - controlled.position.x, p.position.z - controlled.position.z);
                    if (d < minD && d > 0.5 && d < 10) {
                        minD = d;
                        target = p;
                    }
                }
            }
            if (target) {
                const ang = Math.atan2(target.position.z - controlled.position.z, target.position.x - controlled.position.x);
                ballVel.x += Math.cos(ang) * 2.4;
                ballVel.z += Math.sin(ang) * 2.4;
                shootCooldown = 16;
            } else {
                const ang = controlled.userData.team === 'home' ? 0 : Math.PI;
                ballVel.x += Math.cos(ang) * 2.6;
                ballVel.z += (Math.random() - 0.5) * 1.2;
                shootCooldown = 16;
            }
        }
        
        document.getElementById('shootBtn').addEventListener('click', shoot);
        document.getElementById('passBtn').addEventListener('click', pass);
        document.getElementById('sprintBtn').addEventListener('mousedown', () => sprinting = true);
        document.getElementById('sprintBtn').addEventListener('mouseup', () => sprinting = false);
        document.getElementById('sprintBtn').addEventListener('touchstart', (e) => { e.preventDefault(); sprinting = true; });
        document.getElementById('sprintBtn').addEventListener('touchend', (e) => { e.preventDefault(); sprinting = false; });
        
        // Ball physics update
        function updateBall() {
            ballVel.x *= 0.99;
            ballVel.z *= 0.99;
            ballPos.x += ballVel.x;
            ballPos.z += ballVel.z;
            // walls
            if (ballPos.x < -fieldL/2 - 0.3) ballPos.x = -fieldL/2 - 0.3, ballVel.x *= -0.6;
            if (ballPos.x > fieldL/2 + 0.3) ballPos.x = fieldL/2 + 0.3, ballVel.x *= -0.6;
            if (ballPos.z < -fieldW/2 - 0.3) ballPos.z = -fieldW/2 - 0.3, ballVel.z *= -0.6;
            if (ballPos.z > fieldW/2 + 0.3) ballPos.z = fieldW/2 + 0.3, ballVel.z *= -0.6;
            ball.position.x = ballPos.x;
            ball.position.z = ballPos.z;
            
            // Goal check
            if (ballPos.x > fieldL/2 + 0.2 && Math.abs(ballPos.z) < 1.2) {
                homeScore++;
                scoreHomeEl.textContent = homeScore;
                triggerGoal();
                resetGame();
            }
            if (ballPos.x < -fieldL/2 - 0.2 && Math.abs(ballPos.z) < 1.2) {
                awayScore++;
                scoreAwayEl.textContent = awayScore;
                triggerGoal();
                resetGame();
            }
        }
        
        function triggerGoal() {
            const flash = document.createElement('div');
            flash.className = 'goal-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 600);
            possessionEl.style.animation = 'none';
            setTimeout(() => possessionEl.style.animation = '', 10);
        }
        
        function resetGame() {
            ballPos = { x: 0, z: 0 };
            ballVel = { x: 0, z: 0 };
            for (let i=0; i<homeTeam.length; i++) homeTeam[i].position.set(homePos[i].x, 0, homePos[i].z);
            for (let i=0; i<awayTeam.length; i++) awayTeam[i].position.set(awayPos[i].x, 0, awayPos[i].z);
            controlled = homeTeam[7];
            shootCooldown = 0;
        }
        
        // Camera (broadcast, follows ball)
        let camX = 0;
        function updateCamera() {
            const targetX = ballPos.x * 0.35;
            camX += (targetX - camX) * 0.05;
            camera.position.x = camX;
            camera.position.y = 7.2;
            camera.position.z = 14.2;
            camera.lookAt(ballPos.x, 0, ballPos.z);
        }
        
        // Idle animations
        let animTime = 0;
        function animatePlayers() {
            animTime += 0.02;
            for (let p of allPlayers) {
                const head = p.children.find(c => c.geometry && c.geometry.type === 'SphereGeometry' && c.position.y === 0.98);
                if (head) head.position.y = 0.98 + Math.sin(animTime * 2.5) * 0.003;
                // simple arm swing if moving (can be expanded)
            }
        }
        
        // Main loop
        function gameLoop() {
            if (shootCooldown > 0) shootCooldown--;
            updateBall();
            updateControlled();
            updateAI();
            updateCamera();
            animatePlayers();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }
        
        resetGame();
        gameLoop();
        
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
